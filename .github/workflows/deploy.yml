name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
  DEPLOY_USER: ${{ secrets.SERVER_USERNAME }}
  DEPLOY_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          script: |
            echo "========================================"
            echo "🚀 Starting Deployment"
            echo "========================================"

            cd /opt/CleanUp

            # Check git status
            echo "📥 Pulling latest code..."
            git pull origin main
            echo "✅ Code pulled"

            # Show changes
            echo "📝 Recent commits:"
            git log -3 --oneline
            echo ""

            # Current state
            echo "📊 Current containers:"
            docker compose ps
            echo ""

            # Stop old containers
            echo "🛑 Stopping containers..."
            docker compose down || true
            echo "✅ Stopped"

            # Build and start
            echo "🔨 Building containers..."
            docker compose build --no-cache
            echo "✅ Built"

            echo "▶️ Starting containers..."
            docker compose up -d
            echo "✅ Started"

            # Wait for initialization
            echo "⏳ Waiting for services..."
            sleep 20

            # Show status
            echo "📊 Container status:"
            docker compose ps
            echo ""

            # Check logs
            echo "📋 Recent logs:"
            docker compose logs --tail=30
            echo ""

            echo "========================================"
            echo "✅ Deployment Complete"
            echo "========================================"

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 15

      - name: Check backend
        run: |
          echo "🔍 Checking backend..."
          curl -fs -m 15 http://${{ secrets.SERVER_HOST }}:4003/health/ping && echo " ✅ Backend OK"

      - name: Check API
        run: |
          echo "🔍 Checking API..."
          curl -fs -m 15 http://${{ secrets.SERVER_HOST }}/api/health/ping && echo " ✅ API OK"

      - name: Check frontend
        run: |
          echo "🔍 Checking frontend..."
          STATUS=$(curl -fs -m 15 -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}/)
          if [ "$STATUS" = "200" ]; then echo " ✅ Frontend OK (HTTP $STATUS)"; fi

  notify-failure:
    needs: [deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 Deployment Failed!"
          if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text": "🚨 Deployment Failed for CleanUp!"}'
          fi