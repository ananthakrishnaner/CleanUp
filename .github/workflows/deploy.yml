name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
  DEPLOY_USER: ${{ secrets.SERVER_USERNAME }}
  DEPLOY_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build || npx expo export --platform web --output-dir dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  build-docker:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/cleanup-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cleanup-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build payment-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/payment-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cleanup-payment:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend-service image
        uses: docker/build-push-action@v5
        with:
          context: services/backend
          file: services/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cleanup-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend-service image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/cleanup-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          script: |
            echo "========================================"
            echo "🚀 Starting Deployment"
            echo "========================================"
            cd /opt/CleanUp
            git pull origin main
            docker compose down
            docker compose build
            docker compose up -d
            sleep 30
            docker compose ps

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Check backend health
        run: |
          echo "Checking backend health..."
          curl -fs -m 15 http://${{ secrets.SERVER_HOST }}:4003/health/ping

      - name: Check API gateway health
        run: |
          echo "Checking API gateway health..."
          curl -fs -m 15 http://${{ secrets.SERVER_HOST }}/api/health/ping

      - name: Check frontend
        run: |
          echo "Checking frontend..."
          curl -fs -m 15 -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}/

  notify-failure:
    needs: [deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 Deployment Failed!"
          if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text": "🚨 Deployment Failed! Check the logs."}'
          fi