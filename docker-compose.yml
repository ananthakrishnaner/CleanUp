version: "3.9"

# CleanUp — Simplified Container Architecture
# Bring up: docker compose up -d --build
# Seed:     docker compose exec backend node scripts/seed.js
# Tear down:docker compose down -v
# Health:  curl http://localhost:4003/health

networks:
  cleanup_net:
    driver: bridge

volumes:
  mongo_data:
  uploads_data:
  frontend_build:

services:
  # ─── 1. API Gateway (Nginx) ─────────────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: cleanup_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - frontend_build:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - auth
      - payment-gateway
      - frontend
    networks: [cleanup_net]
    restart: unless-stopped

  # ─── 2. Frontend (static build served by Nginx) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cleanup_frontend
    volumes:
      - frontend_build:/app/dist
    networks: [cleanup_net]
    restart: "no"
    command: ["sh", "-c", "npx expo export --platform web --output-dir dist && cp -r dist/* /app/dist/ && tail -f /dev/null"]

  # ─── 3. MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cleanup_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks: [cleanup_net]
    restart: unless-stopped

  # ─── 4. Auth Service (separate container) ─────────────────────────────
  auth:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: cleanup_auth
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: auth_db
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    networks: [cleanup_net]
    restart: unless-stopped

  # ─── 5. Payment Gateway (separate container) ──────────────────────────
  payment-gateway:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: cleanup_payment
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: payment_db
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    networks: [cleanup_net]
    restart: unless-stopped

  # ─── 6. Backend Service (all other services merged) ───────────────────
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: cleanup_backend
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: cleanup_db
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
      AUTH_SERVICE_URL: http://auth:4001
      PAYMENT_SERVICE_URL: http://payment-gateway:4002
      APP_VERSION: "1.0.0"
      CONFIG_ENC_KEY: ${CONFIG_ENC_KEY}
    networks: [cleanup_net]
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4003:4003"


# ─── Container Health Check Scripts ───────────────────────────────
# Add to each service's healthcheck in the individual Dockerfiles:
#
# healthcheck:
#   test: ["CMD", "wget", "-q", "--spider", "http://localhost:4003/health/ping"]
#   interval: 30s
#   timeout: 10s
#   retries: 3
#   start_period: 40s

# ─── Endpoints Summary ───────────────────────────────────────────────
# nginx-proxy:  http://localhost       -> /               (frontend)
#               http://localhost/auth -> auth:4001
#               http://localhost/pay   -> payment-gateway:4002
#               http://localhost/api    -> backend:4003
#
# backend:      http://backend:4003
#               ├── /health             -> Detailed health status
#               ├── /health/ping       -> Simple ping
#               ├── /health/liveness   -> Liveness probe
#               ├── /health/readiness  -> Readiness probe
#               ├── /users             -> User service
#               ├── /cleaners          -> Cleaner service
#               ├── /bookings          -> Booking service
#               ├── /notifications    -> Notification service
#               ├── /admin             -> Admin service
#               ├── /config            -> Config service
#               ├── /support           -> Support service
#               ├── /chat              -> Chat service
#               ├── /reviews          -> Review service
#               ├── /promos            -> Promo service
#               ├── /loyalty           -> Loyalty service
#               └── /analytics        -> Analytics service