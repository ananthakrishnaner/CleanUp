# ────────────────────────────────────────────────────────────────────────
# CleanUp — API gateway + static frontend
# ────────────────────────────────────────────────────────────────────────

upstream auth_svc         { server auth-service:4001;         keepalive 16; }
upstream user_svc         { server user-service:4002;         keepalive 16; }
upstream cleaner_svc      { server cleaner-service:4003;      keepalive 16; }
upstream booking_svc      { server booking-service:4004;      keepalive 16; }
upstream payment_svc      { server payment-service:4005;      keepalive 16; }
upstream notification_svc { server notification-service:4006; keepalive 16; }
upstream admin_svc        { server admin-service:4007;        keepalive 16; }
upstream config_svc       { server config-service:4008;       keepalive 16; }
upstream support_svc      { server support-service:4009;      keepalive 16; }
upstream chat_svc         { server chat-service:4010;         keepalive 16; }
upstream review_svc       { server review-service:4011;       keepalive 16; }
upstream promo_svc        { server promo-service:4012;        keepalive 16; }
upstream loyalty_svc      { server loyalty-service:4013;      keepalive 16; }
upstream analytics_svc    { server analytics-service:4014;    keepalive 16; }

server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt webroot verification just in case
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name clean.ananthakrishnan.icu _;

    ssl_certificate /etc/letsencrypt/live/clean.ananthakrishnan.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clean.ananthakrishnan.icu/privkey.pem;

    # ─── Static frontend (React Native Web build) ─────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # ─── Auth Verification ───────────────────────────────────────
    location = /auth-verify {
        internal;
        proxy_pass http://auth_svc/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # ─── API routes ──────────────────────────────────────────────
    location /api/auth/ { 
        limit_req zone=api_rl burst=40 nodelay; 
        proxy_pass http://auth_svc;          
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id "";
        proxy_set_header X-User-Role "";
        proxy_set_header X-User-Username "";
    }
    
    location /api/users/ {
        auth_request /auth-verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        limit_req zone=api_rl burst=40 nodelay; 
        proxy_pass http://user_svc;          
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Username $auth_user_username;
    }
    
    location /api/cleaners/ {
        auth_request /auth-verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        limit_req zone=api_rl burst=40 nodelay; 
        proxy_pass http://cleaner_svc;       
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Username $auth_user_username;
    }
    
    location /api/bookings/ {
        auth_request /auth-verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        limit_req zone=api_rl burst=40 nodelay; 
        proxy_pass http://booking_svc;       
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Username $auth_user_username;
    }
    
    location /api/admin/ {
        auth_request /auth-verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        limit_req zone=api_rl burst=40 nodelay; 
        proxy_pass http://admin_svc;         
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Username $auth_user_username;
    }

    # Other services
    location /api/payments/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://payment_svc;       
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/notifications/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://notification_svc;  
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/config/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://config_svc;        
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/support/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://support_svc;       
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/chat/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://chat_svc;          
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/reviews/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://review_svc;        
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/promos/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://promo_svc;         
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/loyalty/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://loyalty_svc;       
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }
    location /api/analytics/ { 
        limit_req zone=api_rl burst=40 nodelay; proxy_pass http://analytics_svc;     
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-User-Id ""; proxy_set_header X-User-Role ""; proxy_set_header X-User-Username "";
    }

    # ─── WebSocket upgrade (chat) ─────────────────────────────────
    location /ws/chat/ {
        proxy_pass http://chat_svc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
